<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Caravan PRO v91 - Produção Final</title>
    
    <!-- React Core Stack -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; }
        
        .checklist-scroll::-webkit-scrollbar { width: 4px; }
        .checklist-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* Hotspot de Precisão Absoluta */
        .hotspot-target { 
            position: absolute; width: 46px; height: 46px; margin-left: -23px; margin-top: -23px;
            animation: pulse-yellow 2s infinite; border-radius: 50%; border: 4px solid #fbbf24; 
            background: rgba(251, 191, 36, 0.3); pointer-events: auto; z-index: 100;
            cursor: pointer;
        }
        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.8); transform: scale(1); }
            70% { box-shadow: 0 0 0 20px rgba(251, 191, 36, 0); transform: scale(1.1); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); transform: scale(1); }
        }

        #imageWrapper { 
            position: relative; display: inline-block; line-height: 0; max-width: 100%; background: #000; 
        }
        #mainImg { display: block; max-width: 100%; max-height: 52vh; pointer-events: none; }

        .choice-btn {
            text-align: left; padding: 1rem; border-radius: 1rem; border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.6); transition: all 0.2s; font-size: 0.75rem; font-weight: 700;
            width: 100%; margin-bottom: 0.5rem; line-height: 1.4;
        }
        .choice-btn:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }

        .reasoning-card { 
            border-radius: 0.75rem; border: 1px solid #1e293b; padding: 0.65rem; font-size: 0.65rem; 
            font-weight: 600; cursor: pointer; margin-bottom: 0.4rem; transition: all 0.2s;
            background: rgba(15, 23, 42, 0.6);
        }
        .reasoning-selected { background: #1e40af; border-color: #60a5fa; color: white; transform: scale(1.02); }

        .multi-choice-item {
            display: flex; align-items: center; gap: 0.65rem; padding: 0.75rem;
            border-radius: 0.65rem; border: 1px solid #1e293b; background: rgba(15, 23, 42, 0.8);
            cursor: pointer; font-size: 0.65rem; font-weight: 700; margin-bottom: 0.4rem;
        }
        .multi-choice-selected { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); color: #4ade80; }

        .pilot-active-glow { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.6)); }
        
        .silent-check-overlay {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        // --- SVGS ---

        const PilotSVG = ({ role, active }) => (

        // --- APP ENGINE ---
        function App() {
            const [view, setView] = useState('home');
            const [activeProc, setActiveProc] = useState(null);
            const [step, setStep] = useState(0);
            const [stage, setStage] = useState(1);
            const [manualImages, setManualImages] = useState({});
            const [showDev, setShowDev] = useState(false);
            const [calibActive, setCalibActive] = useState(false);
            const [calibResults, setCalibResults] = useState([]);
            const [multi, setMulti] = useState([]);
            const [reason, setReason] = useState([]);
            const [timer, setTimer] = useState(180);

            const wrapperRef = useRef(null);

            const handleImgClick = (e) => {
                const rect = wrapperRef.current.getBoundingClientRect();
                const x = parseFloat((((e.clientX - rect.left) / rect.width) * 100).toFixed(1));
                const y = parseFloat((((e.clientY - rect.top) / rect.height) * 100).toFixed(1));

                if (calibActive) {
                    const currentItem = activeProc.items[step];
                    const res = [...calibResults, { label: currentItem.label, x, y }];
                    setCalibResults(res);
                    if (step < activeProc.items.length - 1) setStep(step + 1);
                    else { setCalibActive(false); setShowDev(true); }
                    return;
                }

                if (view === 'normal_sim' && activeProc.items[step].type === 'question') return;

                if (view === 'normal_sim' && stage < 4) {
                    const target = activeProc.items[step].coords;
                    if (Math.sqrt(Math.pow(x - target.x, 2) + Math.pow(y - target.y, 2)) < 6.5) advanceStep();
                } 
                else if (view === 'abnormal_sim' && activeProc.phases[step]?.type === 'hotspot') {
                    const target = activeProc.phases[step].target;
                    if (Math.sqrt(Math.pow(x - target.x, 2) + Math.pow(y - target.y, 2)) < 6.5) advanceStep();
                }
            };

            const advanceStep = () => {
                const totalSteps = view === 'normal_sim' ? activeProc.items.length : activeProc.phases.length;
                if (step < totalSteps - 1) {
                    setStep(step + 1);
                    setMulti([]); setReason([]);
                } else {
                    if (view === 'normal_sim' && stage < 4) {
                        setStage(prev => prev + 1); setStep(0);
                    } else {
                        alert("Procedimento Finalizado!"); setView('home');
                    }
                }
            };

            const renderCRMFooter = (color, items, activeRole, currentIndex) => {
                const effectiveRole = (view === 'normal_sim' && stage === 4) ? 'PF' : activeRole;
                const isPMActive = effectiveRole === 'PM' || effectiveRole === 'BOTH';
                const isPFActive = effectiveRole === 'PF' || effectiveRole === 'BOTH';
                return (
                    <footer className="h-40 w-full bg-[#080d1a] border-t border-white/5 flex justify-between items-end px-16 shrink-0 relative shadow-2xl z-50">
                        <div className="flex flex-col items-center mb-[-5px]"><span className="text-[7px] text-slate-500 uppercase mb-1 font-black italic">Comandante + PM</span><PilotSVG role="PM" active={isPMActive} /></div>
                        <div className="mb-12 flex flex-col items-center">
                            <div className="bg-black/60 px-8 py-3 rounded-full border border-blue-500/20 backdrop-blur-xl flex flex-col items-center shadow-xl">
                                <span className="text-[7px] text-blue-400 font-black tracking-widest uppercase mb-1 italic">Cockpit Sync Status</span>
                                <div className="flex gap-1.5 flex-wrap justify-center max-w-[280px]">
                                    {items.map((_, i) => (
                                        <div key={i} className={`w-1.5 h-1.5 rounded-full ${i <= currentIndex ? (color === 'red' ? 'bg-red-500 shadow-[0_0_8px_#ef4444]' : 'bg-emerald-500 shadow-[0_0_8px_cyan]') : 'bg-slate-800'} transition-all duration-300`} />
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col items-center mb-[-5px]"><span className="text-[7px] text-blue-500 uppercase mb-1 font-black italic">Copiloto + PF</span><PilotSVG role="PF" active={isPFActive} /></div>
                    </footer>
                );
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-slate-950 fade-in">
                    {view === 'home' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-10 text-center bg-slate-950">
                            <div className="bg-blue-600 px-12 py-6 rounded-[2rem] shadow-2xl mb-16 border-b-8 border-blue-900"><h1 className="text-white font-black text-6xl italic uppercase tracking-tighter">CARAVAN PRO</h1></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-5xl px-4">
                                <div onClick={() => setView('selection')} className="cursor-pointer bg-slate-900 border-2 border-emerald-500/20 p-12 rounded-[50px] hover:border-emerald-500 transition-all flex flex-col items-center group shadow-2xl active:scale-95">
                                    <div className="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mb-4 group-hover:bg-emerald-500 text-emerald-400 group-hover:text-white transition-all"><SVGIcons.Play /></div>
                                    <h2 className="text-xl font-black uppercase italic tracking-widest text-white">Normal Procedures</h2>
                                </div>
                                <div onClick={() => { setActiveProc(DATABASE.abnormal); setView('abnormal_sim'); setStep(0); }} className="cursor-pointer bg-slate-900 border-2 border-red-500/20 p-12 rounded-[50px] hover:border-red-500 transition-all flex flex-col items-center group shadow-2xl active:scale-95">
                                    <div className="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mb-4 group-hover:bg-red-500 text-red-400 group-hover:text-white transition-all"><SVGIcons.Alert /></div>
                                    <h2 className="text-xl font-black uppercase italic tracking-widest text-white">Abnormal Procedures</h2>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'selection' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-10 bg-slate-950">
                            <button onClick={() => setView('home')} className="absolute top-10 left-10 flex items-center gap-2 text-slate-500 font-black text-xs hover:text-white uppercase transition-all"><SVGIcons.ChevronLeft /> Voltar</button>
                            <h2 className="text-3xl font-black uppercase italic mb-12 text-blue-500 underline underline-offset-8">Select Procedure</h2>
                            <div className="flex flex-col gap-4 w-full max-w-lg">
                                {DATABASE.normal.map(p => (
                                    <button key={p.id} onClick={() => { setActiveProc(p); setView('normal_sim'); setStep(0); setStage(1); }} className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5 hover:bg-blue-600 transition-all text-left flex justify-between font-black uppercase italic tracking-widest shadow-xl group active:scale-95">{p.title} <span>▶</span></button>
                                ))}
                            </div>
                        </div>
                    )}

                    {(view === 'normal_sim' || view === 'abnormal_sim') && activeProc && (
                        <div className="flex-1 flex flex-col overflow-hidden">
                            <header className="h-16 bg-slate-900 border-b border-white/5 flex items-center justify-between px-6 shrink-0 z-50 shadow-xl">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setView('home')} className="p-2 bg-slate-800 rounded-lg hover:bg-red-600 transition-colors"><SVGIcons.ChevronLeft /></button>
                                    <span className="bg-blue-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest italic leading-none">Stage {stage}</span>
                                    <span className="text-[10px] font-black uppercase text-slate-400 italic tracking-widest leading-none truncate max-w-[200px]">{activeProc.title}</span>
                                </div>
                                <button onClick={() => setShowDev(true)} className="flex items-center gap-2 bg-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition-all"><SVGIcons.Settings /> Dev Console</button>
                            </header>

                            <div className="flex-1 flex overflow-hidden relative bg-[#020617]">
                                {/* SIDEBAR FLUXO NORMAL */}
                                {view === 'normal_sim' && stage < 3 && (
                                    <aside className="w-72 bg-[#0f172a] border-r border-slate-800 flex flex-col shrink-0 fade-in">
                                        <div className="p-4 bg-slate-900/40 text-center text-blue-400 font-black text-[8px] uppercase tracking-widest border-b border-white/5">Checklist SOP</div>
                                        <div className="flex-1 overflow-y-auto p-4 space-y-3 checklist-scroll">
                                            {activeProc.items.map((it, i) => (
                                                <div key={it.id} className={`p-3 rounded-xl border transition-all duration-300 ${i < step ? 'bg-emerald-500/10 border-emerald-500/20 opacity-40' : i === step ? 'bg-blue-600 scale-105 shadow-xl border-blue-400' : 'bg-slate-800/20 border-white/5 opacity-20'}`}>
                                                    <div className="text-[9px] font-black uppercase tracking-tighter">{it.label}</div>
                                                    <div className="text-[7px] font-bold opacity-60 mt-1 uppercase italic">{it.status}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </aside>
                                )}

                                {/* SIDEBAR FLUXO ABNORMAL (PM) */}
                                {view === 'abnormal_sim' && (
                                    <aside className={`w-80 bg-[#0f172a] border-r border-slate-800 p-6 overflow-y-auto transition-all duration-500 ${(activeProc.phases[step].role === 'PF' && activeProc.phases[step].type !== 'reasoning') ? 'opacity-10 blur-sm pointer-events-none' : 'opacity-100'}`}>
                                        <h3 className="text-[10px] font-black text-amber-500 uppercase italic mb-6 border-l-2 border-amber-500 pl-3 leading-none">PIC / PM SIDEBAR</h3>
                                        <p className="text-xs font-bold leading-relaxed mb-8 border-l-4 border-blue-500 pl-4 text-slate-100">{activeProc.phases[step].prompt}</p>
                                        
                                        {activeProc.phases[step].type === 'choice' && activeProc.phases[step].choices?.map((c, i) => (
                                            <button key={i} onClick={() => i === activeProc.phases[step].correct ? advanceStep() : alert("Erro SOP.")} className="choice-btn w-full mb-2">{c}</button>
                                        ))}

                                        {activeProc.phases[step].type === 'multi-choice' && activeProc.phases[step].options.map((opt, i) => (
                                            <div key={i} onClick={() => setMulti(prev => prev.includes(i) ? prev.filter(x=>x!==i) : [...prev, i])} className={`multi-choice-item ${multi.includes(i) ? 'multi-choice-selected' : ''}`}>
                                                <div className="w-4 h-4 border border-white/20 rounded flex items-center justify-center">{multi.includes(i) ? '✓' : ''}</div> {opt}
                                            </div>
                                        ))}
                                        {activeProc.phases[step].type === 'multi-choice' && <button onClick={() => multi.length === activeProc.phases[step].correct.length ? advanceStep() : alert("Verifique os parâmetros!")} className="w-full mt-4 bg-emerald-600 py-3 rounded-xl font-black text-xs shadow-lg uppercase active:scale-95 transition-transform">Validar</button>}

                                        {activeProc.phases[step].type === 'reasoning' && (
                                            <div className="space-y-2">
                                                {activeProc.phases[step].items.map((it, i) => (
                                                    <div key={i} onClick={() => setReason(prev => prev.includes(i) ? prev.filter(x=>x!==i) : [...prev, i])} className={`reasoning-card ${reason.includes(i) ? 'reasoning-selected' : ''}`}>{it}</div>
                                                ))}
                                                <button onClick={() => reason.length >= 6 ? advanceStep() : alert("Selecione os 6 itens!")} className="w-full mt-6 bg-blue-600 py-4 rounded-xl font-black text-xs uppercase shadow-xl active:scale-95 transition-all">Confirmar Raciocínio</button>
                                            </div>
                                        )}
                                        {activeProc.phases[step].type === 'timer' && <div className="text-center p-6 bg-black/40 rounded-3xl border border-blue-500/20 shadow-inner"><div className="text-4xl font-black text-blue-500 mb-4 font-mono tracking-tighter">03:00</div><button onClick={() => advanceStep()} className="text-[10px] font-black uppercase text-slate-500 italic hover:text-white transition-colors">⏩ Pular Resfriamento</button></div>}
                                    </aside>
                                )}

                                <main className="flex-1 flex flex-col items-center justify-center p-4 relative overflow-hidden bg-black shadow-inner">
                                    {/* MODO PERGUNTA INTEGRADO */}
                                    {view === 'normal_sim' && activeProc.items[step].type === 'question' && stage < 4 && (
                                        <div className="absolute inset-0 z-[200] flex items-center justify-center p-8 bg-slate-950/90 backdrop-blur-3xl text-left">
                                            <div className="bg-[#0f172a] p-10 rounded-[3rem] border border-blue-500/30 shadow-[0_0_100px_rgba(37,99,235,0.15)] max-w-2xl w-full text-center fade-in">
                                                <div className="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-400"><SVGIcons.Alert /></div>
                                                <h3 className="text-xl font-black uppercase italic mb-8 leading-tight tracking-tight px-4">
                                                    {activeProc.items[step].prompt}
                                                </h3>
                                                <div className="space-y-3 text-left">
                                                    {activeProc.items[step].choices.map((choice, idx) => (
                                                        <button 
                                                            key={idx} 
                                                            onClick={() => idx === activeProc.items[step].correct ? advanceStep() : alert("Incorreto! Verifique os procedimentos operacionais.")}
                                                            className="w-full py-5 px-8 rounded-2xl bg-slate-900 border border-white/5 hover:border-blue-500 hover:bg-blue-900/30 transition-all font-black uppercase italic text-[11px] tracking-widest flex justify-between items-center group shadow-xl active:scale-95"
                                                        >
                                                            {choice} <SVGIcons.ArrowRight />
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* STAGE 4: SILENT CHECKLIST OVERLAY */}
                                    {stage === 4 && view === 'normal_sim' && (
                                        <div className="absolute inset-0 z-[100] flex items-center justify-center p-8 bg-slate-950/80 backdrop-blur-md text-left">
                                            <div className="silent-check-overlay w-full max-w-xl p-10 rounded-[2.5rem] shadow-2xl flex flex-col max-h-[85vh]">
                                                <div className="flex items-center gap-5 mb-8">
                                                    <div className="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white"><SVGIcons.Play /></div>
                                                    <div>
                                                        <h3 className="text-xl font-black uppercase italic text-white leading-none tracking-tight">Silent Checklist</h3>
                                                        <p className="text-[9px] text-blue-400 font-bold uppercase tracking-[0.2em] mt-2">Copiloto (SIC) - Verificação Silenciosa</p>
                                                    </div>
                                                </div>
                                                <div className="flex-1 overflow-y-auto pr-4 checklist-scroll space-y-2 mb-8 text-left text-xs">
                                                    {activeProc.items.map((it, idx) => (
                                                        <div key={idx} className="flex justify-between items-center p-4 bg-black/40 rounded-2xl border border-white/5 group hover:border-blue-500/50 transition-all shadow-sm">
                                                            <span className="text-[10px] font-black uppercase text-slate-400 group-hover:text-white transition-colors tracking-tighter">{it.label}</span>
                                                            <span className="text-[10px] font-black uppercase text-blue-500 italic">... {it.type === 'question' ? 'RESOLVED' : it.status}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                                <button onClick={() => advanceStep()} className="w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black uppercase text-xs shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3 tracking-widest border-b-4 border-emerald-800">
                                                    <SVGIcons.Check /> Checklist Completed
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    <div ref={wrapperRef} onClick={handleImgClick} id="imageWrapper">
                                        <img src={manualImages[activeProc.img] || `./${activeProc.img}.jpg`} id="mainImg" className={`rounded-2xl shadow-2xl border border-white/10 transition-all duration-1000 ${stage === 4 ? 'opacity-20 blur-xl grayscale scale-95' : ''}`} onError={(e) => e.target.src='https://placehold.co/1280x720/020617/1e293b?text=Painel+Aguardando+Imagem'} />
                                        
                                        {/* ALVO ATIVO */}
                                        {((view === 'normal_sim' && stage === 1 && activeProc.items[step].type !== 'question') || (view === 'abnormal_sim' && activeProc.phases[step]?.type === 'hotspot')) && !calibActive && (
                                            <div 
                                                className="hotspot-target" 
                                                style={{ 
                                                    left: `${view === 'normal_sim' ? activeProc.items[step].coords.x : activeProc.phases[step].target.x}%`, 
                                                    top: `${view === 'normal_sim' ? activeProc.items[step].coords.y : activeProc.phases[step].target.y}%` 
                                                }} 
                                            />
                                        )}
                                    </div>
                                </main>

                                {/* SIDEBAR SIC/PF (ABNORMAL) */}
                                {view === 'abnormal_sim' && (
                                    <aside className={`w-80 bg-[#0f172a] border-l border-slate-800 p-6 overflow-y-auto transition-all duration-500 ${(activeProc.phases[step].role === 'PM' && activeProc.phases[step].type !== 'reasoning') ? 'opacity-10 blur-sm pointer-events-none' : 'opacity-100'}`}>
                                        <h3 className="text-[10px] font-black text-blue-500 uppercase italic mb-6 border-r-2 border-blue-500 pr-3 text-right">COPILOTO + PF</h3>
                                        <p className="text-xs font-bold leading-relaxed mb-8 text-right border-r-4 border-blue-500 pr-4">{activeProc.phases[step].prompt}</p>
                                        
                                        {activeProc.phases[step].type === 'choice' && activeProc.phases[step].choices?.map((c, i) => (
                                            <button key={i} onClick={() => i === activeProc.phases[step].correct ? advanceStep() : alert("SOP: Comando incorreto.")} className="choice-btn w-full mb-2">{c}</button>
                                        ))}
                                        
                                        {/* EXIBIR RACIOCÍNIO PARA O PF TAMBÉM */}
                                        {activeProc.phases[step].type === 'reasoning' && (
                                            <div className="space-y-2 opacity-60 pointer-events-none scale-95 origin-top-right">
                                                {activeProc.phases[step].items.map((it, i) => (
                                                    <div key={i} className={`reasoning-card ${reason.includes(i) ? 'reasoning-selected' : ''}`}>{it}</div>
                                                ))}
                                            </div>
                                        )}
                                    </aside>
                                )}
                            </div>

                            {view === 'normal_sim' && renderCRMFooter('emerald', activeProc.items, activeProc.role, step)}
                            {view === 'abnormal_sim' && renderCRMFooter('red', activeProc.phases, activeProc.phases[step].role, step)}
                        </div>
                    )}

                    {/* DEV MODAL */}
                    {showDev && (
                        <div className="fixed inset-0 z-[2000] bg-slate-950/98 backdrop-blur-3xl flex items-center justify-center p-6 animate-in zoom-in duration-300">
                            <div className="bg-slate-900 border border-white/10 w-full max-w-xl rounded-[40px] p-10 shadow-2xl relative text-center">
                                <button onClick={() => setShowDev(false)} className="absolute top-8 right-8 text-slate-500 font-black text-xs hover:text-white uppercase tracking-widest font-black transition-colors">Close [X]</button>
                                <h2 className="text-2xl font-black italic uppercase text-emerald-400 mb-10 tracking-tighter leading-none">Central de Calibração v91</h2>
                                <div className="grid grid-cols-2 gap-6 mb-8 text-left">
                                    <button onClick={() => document.getElementById('upImg').click()} className="bg-slate-800 p-6 rounded-3xl text-[10px] font-black uppercase hover:bg-blue-600 transition-all flex flex-col items-center gap-3 italic shadow-xl">Subir Painel Local</button>
                                    <input type="file" id="upImg" className="hidden" onChange={(e) => {
                                        const r = new FileReader();
                                        r.onload = (ev) => setManualImages({...manualImages, [activeProc.img]: ev.target.result});
                                        r.readAsDataURL(e.target.files[0]);
                                    }} />
                                    <button onClick={() => { setCalibActive(true); setShowDev(false); setStep(0); setCalibResults([]); }} className="bg-emerald-600 p-6 rounded-3xl text-[10px] font-black uppercase hover:bg-emerald-500 transition-all shadow-2xl italic">Calibração Massa</button>
                                </div>
                                <div className="bg-black p-6 rounded-3xl h-40 border border-white/5 shadow-inner overflow-hidden">
                                    <textarea readOnly className="w-full h-full bg-transparent font-mono text-[9px] text-emerald-500 outline-none resize-none leading-relaxed" value={calibResults.map(r => `Item: ${r.label} | { x: ${r.x}, y: ${r.y} }`).join('\n')} />
                                </div>
                                <button onClick={() => { navigator.clipboard.writeText(calibResults.map(r => `Item: ${r.label} | { x: ${r.x}, y: ${r.y} }`).join('\n')); alert("Copiado!"); }} className="w-full mt-6 bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs shadow-2xl active:scale-95 transition-all italic tracking-widest">Copy to Clipboard</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
