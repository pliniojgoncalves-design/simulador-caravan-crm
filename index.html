<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caravan PRO v102 - Ultra-Stability</title>
    
    <!-- Core Stack -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        .checklist-scroll::-webkit-scrollbar { width: 4px; }
        .checklist-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .hotspot-target { 
            position: absolute; width: 46px; height: 46px; margin-left: -23px; margin-top: -22px;
            animation: pulse-yellow 2s infinite; border-radius: 50%; border: 4px solid #fbbf24; 
            background: rgba(251, 191, 36, 0.3); pointer-events: auto; z-index: 100;
            cursor: pointer;
        }
        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.8); transform: scale(1); }
            70% { box-shadow: 0 0 0 20px rgba(251, 191, 36, 0); transform: scale(1.1); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); transform: scale(1); }
        }

        #imageWrapper { position: relative; display: inline-block; line-height: 0; max-width: 100%; background: #000; }
        #mainImg { display: block; max-width: 100%; max-height: 50vh; pointer-events: none; }

        .choice-btn {
            text-align: left; padding: 1rem; border-radius: 1rem; border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.6); transition: all 0.2s; font-size: 0.75rem; font-weight: 700;
            width: 100%; margin-bottom: 0.5rem; line-height: 1.4;
        }
        .choice-btn:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }

        .pilot-active-glow { filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.7)); }
        
        .silent-check-overlay {
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.3);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .event-header-box {
            background: linear-gradient(90deg, #1e293b, #0f172a);
            border: 1px solid #3b82f6; padding: 12px 24px; border-radius: 14px;
            margin-bottom: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 320px;
        }

        .img-tag-badge {
            position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); 
            padding: 4px 10px; border-radius: 6px; font-family: monospace; font-size: 10px;
            color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.2); pointer-events: none; z-index: 150; font-weight: 900;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- DATABASE ---
        const DATABASE = {
            normal: [
                {
                    id: "inspection", title: "Cockpit Inspection", img: "normal-cockpit", role: "PF",
                    items: [
                        { id: "c1", label: "CONTROL LOCK", status: "REMOVE", coords: { x: 36.1, y: 62.4 } },
                        { id: "c18a", label: "FUEL TANK SELECTOR (L)", status: "ON", coords: { x: 81.8, y: 87.1 } },
                        { id: "c18b", label: "FUEL TANK SELECTOR (R)", status: "ON", coords: { x: 85.8, y: 87.1 } },
                        { id: "c19", label: "VENTILATION (P1)", status: "OFF", coords: { x: 90.7, y: 80.6 } },
                        { id: "c20", label: "VENTILATION (P2)", status: "OFF", coords: { x: 80.3, y: 80.6 } }
                    ]
                },
                {
                    id: "preparation", title: "Preliminary Preparation", img: "normal-cockpit-preparation", role: "PF",
                    items: [
                        { id: "p1", label: "BATTERY", status: "ON", coords: { x: 11.8, y: 54.2 } },
                        { id: "p13", label: "ATIS", status: "OBTAIN", coords: { x: 76.1, y: 21 } },
                        { id: "p19", label: "CLEARANCE", status: "OBTAIN", coords: { x: 77.9, y: 44.2 } }
                    ]
                },
                {
                    id: "final_prep", title: "Final Cockpit Preparation & Before Start Checklist", img: "final-cockpit-preparation", role: "PM",
                    items: [
                        { id: "f1", label: "PARKING BRAKE", status: "SET (CYCLE)", coords: { x: 41.3, y: 62.6 } },
                        { id: "f12", label: "COMMAND DECISION", type: "question", prompt: "Qual Check List deve ser solicitado?", choices: ["Before Start", "Before Take OFF", "Parking"], correct: 0, coords: { x: 50, y: 50 } },
                        { id: "f13", label: "COPILOT ACTION", type: "question", role: "PF", prompt: "Ação após leitura até Down to the Line?", choices: ["Pedir autorização acionamento", "Continuar leitura", "Pedir ao CMD"], correct: 0, coords: { x: 50, y: 50 } },
                        { id: "f14", label: "BEACON/ NAV LIGHT", status: "ON", coords: { x: 30.3, y: 42.6 } },
                        { id: "f18", label: "FINAL CALLOUT", type: "question", prompt: "Qual a solicitação final?", choices: ["Continuar Checklist", "Below the Line", "Acionar aeronave"], correct: 1, coords: { x: 50, y: 50 } }
                    ]
                },
                {
                    id: "ils_approach", title: "Approach Procedure - ILS", img: "final-cockpit-preparation", role: "PF",
                    items: [
                        // ILS autorizado
                        { id: "i1", event: "ILS Autorizado", label: "APP MODE", status: "ARM", role: "PF", callout: "LOC and GLIDESLOPE armed", coords: { x: 0, y: 0 } },
                        { id: "i2", event: "ILS Autorizado", label: "FMA", status: "CHECKED", role: "PM", callout: "Checked", coords: { x: 0, y: 0 } },
                        // IAF
                        { id: "i3", event: "IAF reached", label: "PROP CONTROL", status: "FULL FWD", role: "PF", callout: "PROPELLER SET", coords: { x: 0, y: 0 } },
                        { id: "i4", event: "IAF reached", label: "CMD CHECK", status: "CHECKED", role: "PM", callout: "Checked", coords: { x: 0, y: 0 } },
                        // LOC verde
                        { id: "i5", event: "LOC verde no FMA", label: "PF CALLOUT", status: "LOC", role: "PF", callout: "LOC", coords: { x: 0, y: 0 } },
                        { id: "i6", event: "LOC verde no FMA", label: "FMA", status: "CAPTURE", role: "PM", callout: "Checked", coords: { x: 0, y: 0 } },
                        // 2000 AFE
                        { id: "i7", event: "2.000 AFE", label: "FLAPS", status: "REQUEST 10", role: "PF", callout: "Flaps 10", coords: { x: 0, y: 0 } },
                        { id: "i8", event: "2.000 AFE", label: "SPEED", status: "CHECK", role: "PM", callout: "Speed checked", coords: { x: 0, y: 0 } },
                        { id: "i9", event: "2.000 AFE", label: "FLAP POS", status: "10", role: "PM", callout: "Flaps 10", coords: { x: 0, y: 0 } },
                        // GS verde
                        { id: "i10", event: "GS verde no FMA", label: "PF CALLOUT", status: "GLIDESLOPE", role: "PF", callout: "GLIDESLOPE", coords: { x: 0, y: 0 } },
                        { id: "i11", event: "GS verde no FMA", label: "FMA", status: "GS CAPTURE", role: "PM", callout: "Checked", coords: { x: 0, y: 0 } },
                        { id: "i12", event: "GS verde no FMA", label: "GO AROUND ALT", status: "SET", role: "PF", callout: "Altitude set", coords: { x: 0, y: 0 } },
                        // 1800 AFE Sequence
                        { id: "i13", event: "1.800 AFE", label: "FLAPS", status: "REQUEST 20", role: "PF", callout: "Flaps 20", coords: { x: 0, y: 0 } },
                        { id: "i14", event: "1.800 AFE", label: "SPEED", status: "CHECK", role: "PM", callout: "Speed checked", coords: { x: 0, y: 0 } },
                        { id: "i15", event: "1.800 AFE", label: "FLAP POS", status: "20", role: "PM", callout: "Flaps 20", coords: { x: 0, y: 0 } },
                        { id: "i16", event: "1.800 AFE", label: "IGNITION (CA)", status: "SOLICITAR ON", role: "PF", coords: { x: 0, y: 0 } },
                        { id: "i17", event: "1.800 AFE", label: "EXT LIGHTS", status: "SOLICITAR ON", role: "PF", coords: { x: 0, y: 0 } },
                        { id: "i18", event: "1.800 AFE", label: "EXTERNAL LIGHTS", status: "ON", role: "PM", coords: { x: 0, y: 0 } },
                        { id: "i19", event: "1.800 AFE", label: "IGNITION (CA)", status: "ON", role: "PM", coords: { x: 0, y: 0 } },
                        { id: "i20", event: "1.800 AFE", label: "FUEL TANK", status: "BOTH ON", role: "PM", coords: { x: 0, y: 0 } },
                        { 
                            id: "i21", event: "1.800 AFE", type: "question", role: "PF", 
                            prompt: "O que deve ser solicitado após estas ações?", 
                            choices: ["A: Descent Check List", "B: Landing Check List", "C: Autorização"], 
                            correct: 1, coords: { x: 50, y: 50 } 
                        },
                        // Estabilização
                        { id: "i22", event: "1000ft AFE Stabilized", label: "CONFIG", status: "LANDING FLAPS", role: "PF", coords: { x: 0, y: 0 } },
                        { id: "i23", event: "1000ft AFE Stabilized", label: "POWER", status: "ABOVE IDLE", role: "PF", coords: { x: 0, y: 0 } },
                        { id: "i24", event: "100ft para DA", label: "CMD REPORT", status: "Approaching minimums", role: "PM", coords: { x: 0, y: 0 } },
                        { id: "i25", event: "DA approach insight", label: "CMD REPORT", status: "Runway in sight", role: "PM", coords: { x: 0, y: 0 } },
                        { id: "i26", event: "DA approach insight", label: "PF CALLOUT", status: "Continue, FD off", role: "PF", coords: { x: 0, y: 0 } },
                        { id: "i27", event: "DA approach insight", label: "CMD CALLOUT", status: "FD OFF SET", role: "PM", coords: { x: 0, y: 0 } }
                    ]
                }
            ],
            abnormal: {
                title: "Generator Failure",
                phases: [
                    { id: "a1", role: 'PM', img: 'imagem1-generatorfailure', type: 'choice', prompt: 'CAS MSG Detectada. Identificou?', choices: ['Sim', 'Não (Ajuda)'], correct: 0 },
                    { id: "a2", role: 'PM', img: 'imagem1-generatorfailure', type: 'hotspot', prompt: 'Pressione CAUTION.', target: { x: 26, y: 91.9 } },
                    { id: "a3", role: 'PM', img: 'imagem1-generatorfailure', type: 'hotspot', prompt: 'Acesse SYSTEM.', target: { x: 43, y: 90.3 } },
                    { id: "a4", role: 'BOTH', img: 'imagem1-generatorfailure', type: 'reasoning', prompt: 'CRM Logic (6 itens):', items: ['Pane resolvida.', 'Causa desconhecida.', 'Sem suporte no destino.', 'Aeronave AOG.', 'Retornar origem.', 'Não resetar novamente.'], required: 6 }
                ]
            }
        };

        // --- PILOT SVG (Back View Premium) ---
        const PilotSVG = ({ role, active }) => {
            const stripes = role === 'PM' ? 4 : 3;
            return (
                <div className={`transition-all duration-700 w-32 ${active ? 'pilot-active-glow opacity-100 scale-105' : 'opacity-20 grayscale'}`}>
                    <svg viewBox="0 0 200 280" className="w-full h-auto">
                        <path d="M40 280 L160 280 L160 110 Q160 80 130 80 L70 80 Q40 80 40 110 Z" fill="#2d3748" />
                        <rect x="65" y="45" width="70" height="40" rx="10" fill="#1a202c" />
                        <path d="M50 280 L150 280 L145 130 Q145 100 100 100 Q55 100 55 130 Z" fill="#0f172a" />
                        <g transform="translate(50, 110) rotate(-10)">
                            <rect width="38" height="15" fill="black" rx="2" />
                            {Array.from({length: stripes}).map((_, i) => <rect key={i} x={4+(i*8)} y="3" width="4" height="9" fill="#fbbf24" />)}
                        </g>
                        <g transform="translate(112, 103) rotate(10)">
                            <rect width="38" height="15" fill="black" rx="2" />
                            {Array.from({length: stripes}).map((_, i) => <rect key={i} x={4+(i*8)} y="3" width="4" height="9" fill="#fbbf24" />)}
                        </g>
                        <ellipse cx="100" cy="75" rx="22" ry="28" fill="#e0ac69" />
                        <path d="M78 70 Q78 35 100 35 Q122 35 122 70 L122 85 L78 85 Z" fill="#1c1917" />
                        <path d="M75 75 Q75 45 100 45 Q125 45 125 75" fill="none" stroke="#4a5568" strokeWidth="4" />
                    </svg>
                </div>
            );
        };

        // --- APP ENGINE ---
        function App() {
            const [view, setView] = useState('home');
            const [activeProc, setActiveProc] = useState(null);
            const [step, setStep] = useState(0);
            const [stage, setStage] = useState(1);
            const [manualImages, setManualImages] = useState({});
            const [showDev, setShowDev] = useState(false);
            const [calibActive, setCalibActive] = useState(false);
            const [calibResults, setCalibResults] = useState([]);
            
            const wrapperRef = useRef(null);

            // Guard rails to prevent black screen
            const activeItem = useMemo(() => {
                if (!activeProc) return null;
                const items = view === 'normal_sim' ? activeProc.items : activeProc.phases;
                if (!items || step >= items.length) return null;
                return items[step];
            }, [activeProc, step, view]);

            const handleImgClick = (e) => {
                if (!wrapperRef.current || !activeItem) return;
                const rect = wrapperRef.current.getBoundingClientRect();
                const x = parseFloat((((e.clientX - rect.left) / rect.width) * 100).toFixed(1));
                const y = parseFloat((((e.clientY - rect.top) / rect.height) * 100).toFixed(1));

                if (calibActive) {
                    setCalibResults([...calibResults, { label: activeItem.label || 'Action', x, y }]);
                    if (step < activeProc.items.length - 1) setStep(step + 1);
                    else { setCalibActive(false); setShowDev(true); }
                    return;
                }

                if (activeItem.type === 'question' || activeItem.type === 'choice') return;

                const target = view === 'normal_sim' ? activeItem.coords : activeItem.target;
                if (target && Math.sqrt(Math.pow(x - target.x, 2) + Math.pow(y - target.y, 2)) < 6.5) advanceStep();
            };

            const advanceStep = () => {
                const total = view === 'normal_sim' ? activeProc.items.length : activeProc.phases.length;
                if (step < total - 1) {
                    setStep(step + 1);
                } else {
                    if (view === 'normal_sim' && stage < 4) { setStage(stage + 1); setStep(0); }
                    else { alert("Procedimento Finalizado!"); setView('home'); }
                }
            };

            const renderCRMFooter = () => {
                if (!activeProc || !activeItem) return null;
                let effectiveRole = activeItem.role || activeProc.role;
                if (view === 'normal_sim' && stage === 4) effectiveRole = 'PF';
                
                const isPMActive = effectiveRole === 'PM' || effectiveRole === 'BOTH';
                const isPFActive = effectiveRole === 'PF' || effectiveRole === 'BOTH';

                return (
                    <footer className="h-44 w-full bg-[#080d1a] border-t border-white/5 flex justify-between items-end px-12 shrink-0">
                        <div className="flex flex-col items-center mb-[-5px]">
                            <span className="text-[7px] text-slate-500 uppercase mb-2 font-black italic">COMANDANTE + PM</span>
                            <PilotSVG role="PM" active={isPMActive} />
                        </div>
                        <div className="mb-16 flex flex-col items-center">
                            <div className="bg-black/60 px-8 py-3 rounded-full border border-blue-500/20 backdrop-blur-xl">
                                <div className="flex gap-1.5 justify-center max-w-[240px]">
                                    {(view === 'normal_sim' ? activeProc.items : activeProc.phases).map((_, i) => (
                                        <div key={i} className={`w-1.5 h-1.5 rounded-full ${i <= step ? 'bg-emerald-500 shadow-[0_0_8px_cyan]' : 'bg-slate-800'}`} />
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col items-center mb-[-5px]">
                            <span className="text-[7px] text-blue-500 uppercase mb-2 font-black italic">COPILOTO + PF</span>
                            <PilotSVG role="PF" active={isPFActive} />
                        </div>
                    </footer>
                );
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-slate-950 fade-in">
                    {view === 'home' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-10">
                            <h1 className="text-white font-black text-6xl italic uppercase tracking-tighter mb-16">CARAVAN PRO</h1>
                            <div className="grid grid-cols-2 gap-10 w-full max-w-4xl">
                                <button onClick={() => setView('selection')} className="bg-slate-900 border-2 border-emerald-500/20 p-12 rounded-[50px] hover:border-emerald-500 active:scale-95 transition-all flex flex-col items-center group shadow-2xl">
                                    <SVGIcons.Play /> <h2 className="text-xl font-black uppercase italic text-white mt-4 tracking-widest">Normal Procedures</h2>
                                </button>
                                <button onClick={() => { setActiveProc(DATABASE.abnormal); setView('abnormal_sim'); setStep(0); }} className="bg-slate-900 border-2 border-red-500/20 p-12 rounded-[50px] hover:border-red-500 active:scale-95 transition-all flex flex-col items-center group shadow-2xl">
                                    <SVGIcons.Alert /> <h2 className="text-xl font-black uppercase italic text-white mt-4 tracking-widest">Abnormal Procedures</h2>
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'selection' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-10">
                            <button onClick={() => setView('home')} className="absolute top-10 left-10 text-slate-500 font-black text-xs uppercase"><SVGIcons.ChevronLeft /> Menu</button>
                            <h2 className="text-3xl font-black uppercase italic mb-12 text-blue-500 underline underline-offset-8">Select Procedure</h2>
                            <div className="flex flex-col gap-4 w-full max-w-lg">
                                {DATABASE.normal.map(p => (
                                    <button key={p.id} onClick={() => { setActiveProc(p); setView('normal_sim'); setStep(0); setStage(1); }} className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5 hover:bg-blue-600 active:scale-95 transition-all text-left flex justify-between font-black uppercase italic shadow-xl">{p.title} <span>▶</span></button>
                                ))}
                            </div>
                        </div>
                    )}

                    {(view === 'normal_sim' || view === 'abnormal_sim') && activeProc && (
                        <div className="flex-1 flex overflow-hidden">
                            {view === 'normal_sim' && stage < 3 && (
                                <aside className="w-72 bg-[#0f172a] border-r border-slate-800 flex flex-col shrink-0 h-full z-40 shadow-2xl">
                                    <div className="p-4 bg-slate-900/40 text-center text-blue-400 font-black text-[8px] uppercase tracking-widest">Checklist SOP</div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 checklist-scroll">
                                        {activeProc.items.map((it, i) => (
                                            <div key={it.id} className={`p-3 rounded-xl border transition-all duration-300 ${i < step ? 'bg-emerald-500/10 opacity-40' : i === step ? 'bg-blue-600 shadow-xl' : 'bg-slate-800/20 opacity-20'}`}>
                                                <div className="text-[9px] font-black uppercase">{it.label}</div>
                                                <div className="text-[7px] font-bold opacity-60 mt-1 uppercase italic">{it.status}</div>
                                            </div>
                                        ))}
                                    </div>
                                </aside>
                            )}

                            <div className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
                                <header className="h-16 bg-slate-900 border-b border-white/5 flex items-center justify-between px-6 shrink-0 z-50">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setView('home')} className="p-2 bg-slate-800 rounded-lg hover:bg-red-600 transition-colors"><SVGIcons.ChevronLeft /></button>
                                        <span className="bg-blue-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest italic">Stage {stage}</span>
                                        <span className="text-[10px] font-black uppercase text-slate-400 italic truncate max-w-[200px]">{activeProc.title}</span>
                                    </div>
                                    <button onClick={() => setShowDev(true)} className="flex items-center gap-2 bg-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black shadow-lg active:scale-95 transition-all"><SVGIcons.Settings /> Dev Console</button>
                                </header>

                                <main className="flex-1 flex flex-col items-center justify-center p-4 relative overflow-hidden bg-black shadow-inner">
                                    {/* ILS EVENT HEADER */}
                                    {activeProc.id === 'ils_approach' && stage < 4 && activeItem?.event && (
                                        <div className="event-header-box fade-in">
                                            <span className="text-[9px] font-black text-blue-400 uppercase block mb-1">EVENTO ATUAL</span>
                                            <span className="text-lg font-black uppercase italic text-white">{activeItem.event}</span>
                                        </div>
                                    )}

                                    {/* QUESTION OVERLAY */}
                                    {activeItem?.type === 'question' && stage < 4 && (
                                        <div className="absolute inset-0 z-[200] flex items-center justify-center p-8 bg-slate-950/90 backdrop-blur-3xl text-left">
                                            <div className="bg-[#0f172a] p-10 rounded-[3rem] border border-blue-500/30 max-w-xl w-full text-center fade-in">
                                                <h3 className="text-xl font-black uppercase italic mb-8">{activeItem.prompt}</h3>
                                                <div className="space-y-3">
                                                    {activeItem.choices.map((choice, idx) => (
                                                        <button key={idx} onClick={() => idx === activeItem.correct ? advanceStep() : alert("Incorreto!")} className="w-full py-5 px-8 rounded-2xl bg-slate-900 border border-white/5 hover:border-blue-500 transition-all font-black uppercase italic text-[11px] flex justify-between items-center group">
                                                            {choice} <SVGIcons.ArrowRight />
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* SILENT CHECKLIST */}
                                    {stage === 4 && (
                                        <div className="absolute inset-0 z-[200] flex items-center justify-center p-8 bg-slate-950/80 backdrop-blur-md">
                                            <div className="silent-check-overlay w-full max-w-xl p-10 rounded-[2.5rem] shadow-2xl flex flex-col max-h-[85vh]">
                                                <h3 className="text-xl font-black uppercase italic text-white mb-8">Silent Checklist Validation</h3>
                                                <div className="flex-1 overflow-y-auto pr-4 checklist-scroll space-y-2 mb-8 text-left text-xs">
                                                    {activeProc.items.map((it, idx) => (
                                                        <div key={idx} className="flex justify-between items-center p-4 bg-black/40 rounded-2xl border border-white/5 shadow-sm">
                                                            <span className="text-[10px] font-black uppercase text-slate-400">{it.label}</span>
                                                            <span className="text-[10px] font-black uppercase text-blue-500 italic">... {it.status}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                                <button onClick={() => advanceStep()} className="w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-3">
                                                    <SVGIcons.Check /> Checklist Completed
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    <div ref={wrapperRef} onClick={handleImgClick} id="imageWrapper">
                                        <div className="img-tag-badge">FILE: {activeProc.img || activeItem?.img}.jpg</div>
                                        <img 
                                            src={manualImages[activeProc.img || activeItem?.img] || `./${activeProc.img || activeItem?.img}.jpg`} 
                                            id="mainImg" className={`rounded-2xl shadow-2xl border border-white/10 transition-all duration-1000 ${stage === 4 ? 'opacity-20 blur-xl scale-95' : ''}`}
                                            onError={(e) => { setShowDev(true); e.target.src='https://placehold.co/1280x720/020617/1e293b?text=ERRO:+Imagem+ausente'; }}
                                        />
                                        {/* Hotspot Target */}
                                        {stage === 1 && activeItem?.coords && activeItem.type !== 'question' && (
                                            <div className="hotspot-target" style={{ left: `${activeItem.coords.x}%`, top: `${activeItem.coords.y}%` }} />
                                        )}
                                    </div>
                                </main>

                                {renderCRMFooter()}
                            </div>
                        </div>
                    )}

                    {/* DEV MODAL */}
                    {showDev && (
                        <div className="fixed inset-0 z-[2000] bg-slate-950/98 backdrop-blur-3xl flex items-center justify-center p-6">
                            <div className="bg-slate-900 border border-white/10 w-full max-w-xl rounded-[40px] p-10 shadow-2xl">
                                <button onClick={() => setShowDev(false)} className="float-right text-xs font-black uppercase">Close [X]</button>
                                <h2 className="text-2xl font-black uppercase text-emerald-400 mb-8">Dev Console v101</h2>
                                <div className="grid grid-cols-2 gap-6 mb-8 text-[10px]">
                                    <button onClick={() => document.getElementById('upImg').click()} className="bg-slate-800 p-6 rounded-3xl uppercase font-black italic">Subir Arquivo Local</button>
                                    <input type="file" id="upImg" className="hidden" onChange={(e) => {
                                        const r = new FileReader();
                                        r.onload = (ev) => {
                                            const key = activeProc.img || activeItem?.img;
                                            setManualImages({...manualImages, [key]: ev.target.result});
                                            alert("Sucesso!");
                                        };
                                        r.readAsDataURL(e.target.files[0]);
                                    }} />
                                    <button onClick={() => { setCalibActive(true); setShowDev(false); setStep(0); setCalibResults([]); }} className="bg-emerald-600 p-6 rounded-3xl uppercase font-black italic shadow-2xl">Mapear Coordenadas</button>
                                </div>
                                <div className="bg-black p-6 rounded-3xl h-40 border border-white/5 shadow-inner overflow-hidden text-emerald-500 font-mono text-[9px]">
                                    {calibResults.map(r => `Item: ${r.label} | { x: ${r.x}, y: ${r.y} }`).join('\n')}
                                </div>
                                <button onClick={() => { navigator.clipboard.writeText(calibResults.map(r => `Item: ${r.label} | { x: ${r.x}, y: ${r.y} }`).join('\n')); alert("Copiado!"); }} className="w-full mt-6 bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs shadow-2xl active:scale-95 transition-all italic tracking-widest">Copy to Clipboard</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
