<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caravan PRO v190 - Digital Product</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; height: 100vh; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hotspot-target {
            position: absolute; width: 50px; height: 50px;
            background: rgba(59, 130, 246, 0.2); border: 2px solid #3b82f6;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; animation: pulse 2s infinite;
            z-index: 100;
        }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.2; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } }
        
        .img-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        .main-view-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // --- ICONOGRAFIA ---
        const Icons = {
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Back: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        // --- DATABASE ---
        const DATABASE = {
            normal: [
                {
                    title: "Inspeção Interna do Cockpit",
                    id: "inspecao_interna_v1",
                    category: "normal",
                    img: "normal-cockpit",
                    items: [
                        { id: "it_1", label: "CONTROL LOCK", status: "REMOVE", role: "Copiloto", coords: { x: 38.6, y: 61.8 } },
                        { id: "it_2", label: "YOKE", status: "FULL AFTERWARD", role: "Copiloto", coords: { x: 38.6, y: 61.8 } },
                        { id: "it_3", label: "ALL SWITCHES", status: "OFF", role: "Copiloto", coords: { x: 33.5, y: 30.8 } },
                        { id: "it_4", label: "ALL SWITCHES", status: "OFF", role: "Copiloto", coords: { x: 19.6, y: 74.5 } },
                        { id: "it_5", label: "CIRCUIT BREAKERS", status: "IN", role: "Copiloto", coords: { x: 34.2, y: 44.6 } },
                        { id: "it_6", label: "CIRCUIT BREAKERS", status: "IN", role: "Copiloto", coords: { x: 24.6, y: 76.1 } },
                        { id: "it_7", label: "ALT STATIC AIR", status: "OFF", role: "Copiloto", coords: { x: 31.2, y: 50.9 } },
                        { id: "it_8", label: "INERTIAL SEPARATOR", status: "NORMAL", role: "Copiloto", coords: { x: 48.7, y: 45.6 } },
                        { id: "it_9", label: "TRIMS - ELEVATOR", status: "SET", role: "Copiloto", coords: { x: 48.6, y: 60.7 } },
                        { id: "it_10", label: "TRIMS - AILERON", status: "SET", role: "Copiloto", coords: { x: 53.1, y: 73.7 } },
                        { id: "it_11", label: "TRIMS - RUDDER", status: "SET", role: "Copiloto", coords: { x: 54.1, y: 78.2 } },
                        { id: "it_12", label: "FUEL SHUTOFF", status: "PUSH IN", role: "Copiloto", coords: { x: 56.3, y: 73.3 } },
                        { id: "it_13", label: "CABIN HEAT FIREWALL SHUTOFF", status: "PUSH IN", role: "Copiloto", coords: { x: 55.3, y: 86.9 } },
                        { id: "it_14", label: "EMERGENCY PWR LEVER", status: "NORMAL", role: "Copiloto", coords: { x: 51.1, y: 64.6 } },
                        { id: "it_15", label: "PROP.CONTROL LEVER", status: "FULL FORWARD", role: "Copiloto", coords: { x: 53, y: 61.1 } },
                        { id: "it_16", label: "AIR CONDITIONING", status: "OFF", role: "Copiloto", coords: { x: 51.2, y: 50.4 } },
                        { id: "it_17", label: "BLEED AIR HEAT", status: "OFF", role: "Copiloto", coords: { x: 57.2, y: 50.1 } },
                        { id: "it_18", label: "FUEL TANK SELECTORS", status: "1 ON", role: "Copiloto", coords: { x: 72.5, y: 88 } },
                        { id: "it_19", label: "FUEL TANK SELECTORS", status: "1 OFF", role: "Copiloto", coords: { x: 74.7, y: 88.4 } },
                        { id: "it_20", label: "VENTILATION", status: "OFF", role: "Copiloto", coords: { x: 73.5, y: 81.5 } },
                        { id: "it_21", label: "STBY FLAP MOTOR", status: "GUARDED NORM", role: "Copiloto", coords: { x: 73.5, y: 72 } }
                    ]
                }
            ],
            abnormal: []
        };

        // --- MFE: AVATAR COMPACTO ---
        const PilotAvatar = ({ side, active, stripes, roleLabel }) => (
            <div className={`flex flex-col items-center gap-1 transition-all duration-700 ${active ? 'opacity-100 scale-100' : 'opacity-10 grayscale'}`}>
                <div className={`w-12 h-12 md:w-14 md:h-14 rounded-xl border flex flex-col items-center justify-center relative overflow-hidden ${active ? 'border-blue-500 bg-blue-500/20 shadow-[0_0_20px_#3b82f6]' : 'bg-slate-800'}`}>
                    <svg viewBox="0 0 100 100" className="w-6 h-6 md:w-8 md:h-8 text-white opacity-60">
                        <circle cx="50" cy="35" r="15" fill="currentColor" />
                        <path d="M20 85 Q20 55 50 55 Q80 55 80 85" fill="currentColor" />
                    </svg>
                    <div className="absolute bottom-0 w-full h-2.5 md:h-3 bg-black/90 flex flex-col justify-center gap-0.5 px-2">
                        {[...Array(stripes)].map((_, i) => <div key={i} className="w-full h-[0.5px] md:h-[1px] bg-yellow-500"></div>)}
                    </div>
                </div>
                <div className="text-center leading-none">
                    <span className="text-[7px] md:text-[8px] font-black uppercase text-white tracking-tighter italic">{side === 'LEFT' ? 'PILOTO' : 'COPILOTO'}</span>
                </div>
            </div>
        );

        // --- MFE: SIDEBAR SLIM ---
        const ActionSidebar = ({ pilotName, role, items, activeIdx, side }) => (
            <aside className={`w-28 md:w-32 lg:w-36 h-full flex flex-col bg-slate-950/95 shrink-0 italic border-white/5 ${side === 'LEFT' ? 'border-r' : 'border-l'}`}>
                <div className="p-2 border-b border-white/5 bg-blue-900/10 flex flex-col items-center text-center">
                    <span className="text-[8px] font-black uppercase tracking-tighter text-blue-300 leading-none">{pilotName}</span>
                    <span className="text-[6px] font-bold bg-blue-600 px-1 py-0.5 rounded mt-1 italic uppercase">{role}</span>
                </div>
                <div className="flex-1 overflow-y-auto p-1.5 space-y-1 custom-scroll pb-20">
                    {items.map((it, i) => (
                        <div key={it.id} className={`p-1.5 md:p-2 rounded-lg border transition-all duration-500 ${items[activeIdx]?.id === it.id ? 'bg-blue-600 border-blue-400 scale-105 shadow-md' : 'opacity-5 grayscale border-white/5'}`}>
                            <p className="text-[7px] md:text-[8px] font-black uppercase leading-tight">{it.label}</p>
                            <p className="text-[6px] font-bold opacity-40 mt-1 uppercase tracking-tighter">{it.status}</p>
                        </div>
                    ))}
                </div>
            </aside>
        );

        // --- APP PRINCIPAL ---
        function App() {
            const [page, setPage] = useState('category');
            const [category, setCategory] = useState('normal');
            const [activeProc, setActiveProc] = useState(null);
            const [pilotIsFlying, setPilotIsFlying] = useState(true);
            const [stepIdx, setStepIdx] = useState(0);
            const [stage, setStage] = useState(1); 
            const [completed, setCompleted] = useState(false);
            const wrapperRef = useRef(null);

            const activeItems = useMemo(() => activeProc?.items || [], [activeProc]);
            const currentItem = activeItems[stepIdx];

            const pilotActions = useMemo(() => {
                return activeItems.filter(it => it.role === 'Piloto' || it.role === 'Comandante' || (it.role === 'PF' && pilotIsFlying) || (it.role === 'PM' && !pilotIsFlying) || it.role === 'BOTH');
            }, [activeItems, pilotIsFlying]);

            const copilotActions = useMemo(() => {
                return activeItems.filter(it => it.role === 'Copiloto' || it.role === 'Primeiro Oficial' || (it.role === 'PF' && !pilotIsFlying) || (it.role === 'PM' && pilotIsFlying) || it.role === 'BOTH');
            }, [activeItems, pilotIsFlying]);

            const actingPilotSide = useMemo(() => {
                if (!currentItem) return null;
                const r = currentItem.role;
                if (r === 'BOTH') return 'BOTH';
                if (r === 'Copiloto' || r === 'Primeiro Oficial') return 'RIGHT';
                if (r === 'Piloto' || r === 'Comandante') return 'LEFT';
                if (r === 'PF') return pilotIsFlying ? 'LEFT' : 'RIGHT';
                if (r === 'PM') return pilotIsFlying ? 'RIGHT' : 'LEFT';
                return null;
            }, [currentItem, pilotIsFlying]);

            const handleInteraction = (e) => {
                if (!wrapperRef.current || completed || !currentItem) return;
                const rect = wrapperRef.current.getBoundingClientRect();
                const x = parseFloat((((e.clientX - rect.left) / rect.width) * 100).toFixed(1));
                const y = parseFloat((((e.clientY - rect.top) / rect.height) * 100).toFixed(1));

                const dist = Math.sqrt(Math.pow(x - currentItem.coords.x, 2) + Math.pow(y - currentItem.coords.y, 2));
                if (dist < 8.0) {
                    if (stepIdx < activeItems.length - 1) setStepIdx(stepIdx + 1);
                    else if (stage < 3) { setStage(stage + 1); setStepIdx(0); }
                    else setCompleted(true);
                }
            };

            // --- TELAS ---
            if (page === 'category') return (
                <main className="h-screen w-full flex flex-col items-center justify-center bg-[#020617] p-10 fade-in italic">
                    <div className="text-center mb-12">
                        <h2 className="text-blue-500 font-black text-xs uppercase tracking-[0.5em] mb-4">Training Academy</h2>
                        <h1 className="text-5xl font-black text-white uppercase tracking-tighter leading-none italic">Caravan PRO</h1>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
                        <button onClick={() => { setCategory('normal'); setPage('list'); }} className="bg-slate-900 border border-white/5 p-12 rounded-[3rem] hover:border-blue-500 transition-all group flex flex-col items-center gap-6">
                            <div className="p-5 bg-blue-500/10 rounded-2xl text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-all"><Icons.Play /></div>
                            <span className="text-2xl font-black uppercase text-white tracking-tighter italic">Normal Flow</span>
                        </button>
                        <button disabled className="bg-slate-900 border border-white/5 p-12 rounded-[3rem] opacity-20 flex flex-col items-center gap-6 cursor-not-allowed">
                            <Icons.Check />
                            <span className="text-2xl font-black uppercase text-red-400 tracking-tighter">Emergency</span>
                        </button>
                    </div>
                </main>
            );

            if (page === 'list') return (
                <main className="h-screen w-full flex flex-col items-center justify-center bg-[#020617] p-10 fade-in italic">
                    <div className="w-full max-w-xl flex flex-col gap-6">
                        <button onClick={() => setPage('category')} className="text-slate-500 hover:text-white text-[10px] font-black uppercase tracking-widest flex items-center gap-2 mb-2"><Icons.Back /> Voltar</button>
                        <h3 className="text-3xl font-black text-white uppercase tracking-tighter italic">Seleção de Módulo</h3>
                        <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scroll">
                            {DATABASE[category].map(p => (
                                <button key={p.id} onClick={() => { setActiveProc(p); setPage('config'); }} className="w-full bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/5 hover:border-blue-500/50 transition-all flex justify-between items-center group shadow-xl">
                                    <div className="text-left leading-none">
                                        <span className="text-xl font-black uppercase text-white group-hover:text-blue-400">{p.title}</span>
                                        <p className="text-[9px] text-slate-500 mt-2 tracking-widest uppercase italic">{p.items.length} Passos</p>
                                    </div>
                                    <Icons.Play />
                                </button>
                            ))}
                        </div>
                    </div>
                </main>
            );

            if (page === 'config') return (
                <main className="h-screen w-full flex flex-col items-center justify-center bg-[#001c3d]/20 backdrop-blur-3xl p-6 fade-in italic">
                    <h3 className="text-3xl font-black text-white uppercase tracking-tighter mb-12 italic text-center underline underline-offset-8 decoration-blue-600">Matriz de Tripulação</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
                        <button onClick={() => { setPilotIsFlying(false); setPage('simulator'); setStepIdx(0); setStage(1); }} className="bg-slate-900 border border-white/10 p-12 rounded-[4rem] hover:border-blue-500 transition-all group flex flex-col items-center gap-6 shadow-2xl text-center">
                            <h4 className="text-xl font-black uppercase text-white leading-none">Configuração 1</h4>
                            <p className="text-[10px] text-slate-400 font-black uppercase">PILOTO: MONITORING (PM)</p>
                            <p className="text-[10px] text-blue-400 font-black uppercase">COPILOTO: FLYING (PF)</p>
                        </button>
                        <button onClick={() => { setPilotIsFlying(true); setPage('simulator'); setStepIdx(0); setStage(1); }} className="bg-slate-900 border border-white/10 p-12 rounded-[4rem] hover:border-blue-500 transition-all group flex flex-col items-center gap-6 shadow-2xl text-center">
                            <h4 className="text-xl font-black uppercase text-white leading-none">Configuração 2</h4>
                            <p className="text-[10px] text-blue-400 font-black uppercase">PILOTO: FLYING (PF)</p>
                            <p className="text-[10px] text-slate-400 font-black uppercase">COPILOTO: MONITORING (PM)</p>
                        </button>
                    </div>
                </main>
            );

            return (
                <div className="h-screen w-full flex flex-col bg-[#020617] text-white font-sans overflow-hidden italic leading-none selection:bg-blue-500/30">
                    
                    {/* HEADER COMPACTO */}
                    <header className="h-10 border-b border-white/5 flex items-center justify-between px-6 bg-[#001c3d]/95 backdrop-blur-md z-[100] shrink-0 italic leading-none">
                        <div className="flex items-center gap-4 leading-none">
                            <div className="bg-white px-1 py-0.5 rounded shadow-xl border border-white/20">
                                <div className="text-[#001c3d] font-black text-sm uppercase italic">Azul <span className="font-light">conecta</span></div>
                            </div>
                            <div className="flex gap-1.5 ml-2">
                                {[1,2,3].map(s => (
                                    <div key={s} className={`w-2 h-1 rounded-full ${stage >= s ? 'bg-blue-500' : 'bg-slate-800'}`} />
                                ))}
                            </div>
                        </div>
                        <button onClick={() => setPage('category')} className="text-red-500 text-[8px] font-black uppercase tracking-widest italic">Abandonar</button>
                    </header>

                    {/* VIEW: SIMULADOR (FOCUS VIEW) */}
                    <div className="flex-1 flex overflow-hidden relative">
                        
                        {/* SIDEBAR PILOTO (STAGE 1 & 2 APENAS) */}
                        {stage < 3 && (
                            <ActionSidebar 
                                pilotName="PILOTO" side="LEFT"
                                role={pilotIsFlying ? "PF" : "PM"} 
                                items={pilotActions}
                                activeIdx={pilotActions.findIndex(a => a.id === currentItem?.id)}
                            />
                        )}

                        {/* ÁREA CENTRAL: COCKPIT EXPANDIDO */}
                        <main className="flex-1 flex flex-col bg-black shadow-inner overflow-hidden italic relative">
                            <div className="h-8 bg-slate-900/60 border-b border-white/5 flex items-center justify-between px-6 shrink-0 z-10 leading-none">
                                <div className="flex items-center gap-3">
                                    <div className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase italic ${stage === 3 ? 'bg-amber-600 animate-pulse' : 'bg-blue-600'}`}>
                                        {stage === 1 ? 'Tutorial' : stage === 2 ? 'Checklist' : 'Memória'}
                                    </div>
                                    <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">{activeProc.title}</span>
                                </div>
                                <span className={`text-[9px] font-black tracking-widest italic transition-opacity duration-500 ${stage === 3 ? 'opacity-0' : 'text-amber-500 opacity-100'}`}>
                                    {currentItem?.label}
                                </span>
                            </div>

                            <div className="flex-1 p-1 relative overflow-hidden bg-[#05080f]">
                                <div id="imageContainer" ref={wrapperRef} onClick={handleInteraction} className="img-container relative cursor-crosshair">
                                    <img 
                                        src={`./${currentItem?.specificImg || activeProc.img}.jpg`} 
                                        className="main-view-img rounded shadow-[0_0_80px_rgba(0,0,0,1)] border border-white/5" 
                                        onError={(e) => e.target.src="https://placehold.co/1280x720/111/333?text=UPLOAD+ASSET"} 
                                    />
                                    {/* Hotspot: Apenas STAGE 1 */}
                                    {stage === 1 && currentItem?.coords && (
                                        <div className="hotspot-target" style={{ left: `${currentItem.coords.x}%`, top: `${currentItem.coords.y}%` }} />
                                    )}
                                </div>
                            </div>

                            {/* FOOTER CREW HUD (ULTRA SLIM) */}
                            <footer className="h-20 border-t border-white/5 flex items-center justify-between px-10 md:px-24 bg-[#001c3d]/80 backdrop-blur-xl shrink-0 italic shadow-[0_-10px_30px_rgba(0,0,0,0.8)] z-50">
                                <PilotAvatar 
                                    side="LEFT" stripes={4}
                                    active={actingPilotSide === 'LEFT' || actingPilotSide === 'BOTH'} 
                                    roleLabel={pilotIsFlying ? "PF" : "PM"}
                                />

                                <div className="flex-1 max-w-xs md:max-w-sm flex flex-col items-center gap-2 mx-4">
                                    <div className="w-full h-0.5 bg-white/10 rounded-full overflow-hidden relative">
                                        <div className="h-full bg-blue-500 transition-all duration-700 shadow-[0_0_10px_#3b82f6]" style={{ width: `${((stepIdx + 1) / activeProc.items.length) * 100}%` }} />
                                    </div>
                                    <span className="text-[7px] font-black text-slate-500 uppercase tracking-widest italic opacity-60">Status: {stepIdx + 1} / {activeProc.items.length}</span>
                                </div>

                                <PilotAvatar 
                                    side="RIGHT" stripes={3}
                                    active={actingPilotSide === 'RIGHT' || actingPilotSide === 'BOTH'} 
                                    roleLabel={!pilotIsFlying ? "PF" : "PM"}
                                />
                            </footer>
                        </main>

                        {/* SIDEBAR COPILOTO (STAGE 1 & 2 APENAS) */}
                        {stage < 3 && (
                            <ActionSidebar 
                                pilotName="COPILOTO" side="RIGHT"
                                role={!pilotIsFlying ? "PF" : "PM"} 
                                items={copilotActions}
                                activeIdx={copilotActions.findIndex(a => a.id === currentItem?.id)}
                            />
                        )}
                    </div>

                    {/* MODAL FIM */}
                    {completed && (
                        <div className="fixed inset-0 z-[11000] bg-black/98 backdrop-blur-3xl flex items-center justify-center p-8 fade-in italic">
                            <div className="bg-[#001c3d] border border-white/10 p-12 rounded-[4rem] w-full max-w-sm text-center shadow-2xl relative border-b-[12px] border-emerald-600 italic leading-none">
                                <Icons.Check />
                                <h2 className="text-4xl font-black italic uppercase text-white mb-4 mt-6 tracking-tighter">Missão OK</h2>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest mb-10">Proficiência validada nos 3 níveis.</p>
                                <button onClick={() => location.reload()} className="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-[2.5rem] font-black uppercase text-[10px] tracking-widest transition-all">Novo Treino</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
