<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caravan PRO v131 - Precision Legacy</title>
    
    <!-- React Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; height: 100vh; }
        .checklist-scroll::-webkit-scrollbar { width: 4px; }
        .checklist-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        /* ALINHAMENTO ABSOLUTO - O CENTRO DO CÍRCULO É O PONTO EXATO X,Y */
        .hotspot-target { 
            position: absolute; 
            width: 44px; 
            height: 44px; 
            transform: translate(-50%, -50%) !important; 
            animation: pulse-yellow 2s infinite; 
            border-radius: 50%; 
            border: 4px solid #fbbf24; 
            background: rgba(251, 191, 36, 0.2); 
            pointer-events: none; /* Deixa o clique passar para o container pai */
            z-index: 100; 
        }

        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.8); transform: translate(-50%, -50%) scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); transform: translate(-50%, -50%) scale(1.1); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); transform: translate(-50%, -50%) scale(1); }
        }

        #imageContainer { 
            position: relative; 
            display: inline-block; 
            line-height: 0; 
            border-radius: 12px;
            cursor: crosshair;
        }

        #mainImg { 
            display: block; 
            width: auto;
            height: auto;
            max-width: 100%; 
            max-height: 60vh; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            pointer-events: none;
        }

        .pilot-active-glow { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6)); }
        
        .event-header-box {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid #3b82f6; padding: 10px 20px; border-radius: 14px;
            margin-bottom: 8px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            min-width: 320px;
        }

        .img-tag-badge {
            position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.85); 
            padding: 4px 10px; border-radius: 6px; font-family: monospace; font-size: 10px;
            color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.2); pointer-events: none; z-index: 150; font-weight: 900;
        }

        .result-overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px);
            padding: 20px;
        }

        .result-card {
            background: #0f172a; border: 2px solid #3b82f6; border-radius: 3rem;
            padding: 3rem; width: 100%; max-width: 480px;
            box-shadow: 0 0 100px rgba(0,0,0,1); text-align: center;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Component } = React;

        // --- ICONS (Nativos SVG) ---
        const Icons = {
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Alert: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>,
            Back: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Check: () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Timer: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Target: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>,
            Benchmark: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"></path></svg>,
            Arrow: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        };

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-10 text-center font-mono">
                            <h1 className="text-xl font-black text-red-500 uppercase mb-4 italic">CRITICAL SYSTEM ERROR</h1>
                            <div className="bg-black p-4 rounded-lg border border-red-900/50 max-w-lg text-left text-[10px] text-red-400 overflow-auto mb-6">
                                {this.state.error?.toString()}
                            </div>
                            <button onClick={() => window.location.reload()} className="bg-blue-600 px-6 py-2 rounded-full text-xs font-bold uppercase">System Reset</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- DATABASE INTEGRAL (Restauração de 100% das etapas) ---
        const DATABASE = {
            normal: [
                {
                    id: "inspection", title: "Cockpit Inspection", img: "normal-cockpit", role: "PF",
                    items: [
                        { id: "c1", label: "CONTROL LOCK", status: "REMOVE", coords: { x: 36.1, y: 62.4 } },
                        { id: "c2", label: "YOKE", status: "FULL AFTERWARD", coords: { x: 34.3, y: 63.1 } },
                        { id: "c3", label: "ALL SWITCHES (P1)", status: "OFF", coords: { x: 28.5, y: 31.3 } },
                        { id: "c4", label: "ALL SWITCHES (P2)", status: "OFF", coords: { x: 10.4, y: 73.8 } },
                        { id: "c5", label: "CIRCUIT BREAKERS (P1)", status: "IN", coords: { x: 29.9, y: 44.6 } },
                        { id: "c6", label: "CIRCUIT BREAKERS (P2)", status: "IN", coords: { x: 18.5, y: 75.8 } },
                        { id: "c7", label: "ALT STATIC AIR", status: "OFF", coords: { x: 25.9, y: 51.4 } },
                        { id: "c8", label: "INERTIAL SEPARATOR", status: "NORMAL", coords: { x: 48.6, y: 45.6 } },
                        { id: "c9", label: "TRIMS (ELEVATOR)", status: "SET", coords: { x: 48.4, y: 60.2 } },
                        { id: "c10", label: "TRIMS (AILERON)", status: "SET", coords: { x: 54.2, y: 72.8 } },
                        { id: "c11", label: "TRIMS (RUDDER)", status: "SET", coords: { x: 56.0, y: 76.7 } },
                        { id: "c12", label: "FUEL SHUTOFF", status: "PUSH IN", coords: { x: 59.7, y: 71.5 } },
                        { id: "c13", label: "CABIN HEAT FIREWALL", status: "PUSH IN", coords: { x: 58.3, y: 85.2 } },
                        { id: "c14", label: "EMERGENCY PWR LEVER", status: "NORMAL", coords: { x: 51.6, y: 64.4 } },
                        { id: "c15", label: "PROP. CONTROL LEVER", status: "FULL FORWARD", coords: { x: 56.0, y: 61.5 } },
                        { id: "c16", label: "AIR CONDITIONING", status: "OFF", coords: { x: 51.9, y: 50.4 } },
                        { id: "c17", label: "BLEED AIR HEAT", status: "OFF", coords: { x: 61.1, y: 50.8 } },
                        { id: "c18a", label: "FUEL TANK SELECTOR (L)", status: "ON", coords: { x: 81.8, y: 87.1 } },
                        { id: "c18b", label: "FUEL TANK SELECTOR (R)", status: "ON", coords: { x: 85.8, y: 87.1 } },
                        { id: "c19", label: "VENTILATION (P1)", status: "OFF", coords: { x: 90.7, y: 80.6 } },
                        { id: "c20", label: "VENTILATION (P2)", status: "OFF", coords: { x: 80.3, y: 80.6 } },
                        { id: "c21", label: "STBY FLAP MOTOR", status: "GUARDED NORM", coords: { x: 85.9, y: 71.5 } }
                    ]
                },
                {
                    id: "preparation", title: "Preliminary Preparation", img: "normal-cockpit-preparation", role: "PF",
                    items: [
                        { id: "p1", label: "BATTERY", status: "ON", coords: { x: 11.8, y: 54.2 } },
                        { id: "p2", label: "AVIONICS 1 AND 2", status: "ON", coords: { x: 11.4, y: 62.5 } },
                        { id: "p3", label: "GNSS/FMS DATA BASE", status: "CHECK", coords: { x: 55.1, y: 23 } },
                        { id: "p4", label: "BUS VOLTS", status: "MIN 24V", coords: { x: 49.3, y: 26.7 } },
                        { id: "p5", label: "EXTERNAL POWER", status: "BUS", coords: { x: 10.5, y: 54.8 } },
                        { id: "p7", label: "FIRE DETECT TEST", status: "PERFORM", coords: { x: 25.4, y: 35 } },
                        { id: "p13", label: "ATIS", status: "OBTAIN", coords: { x: 76.1, y: 21 } },
                        { id: "p14", label: "ALTIMETER PFD 1", status: "SET", coords: { x: 43.9, y: 22.6 } },
                        { id: "p15", label: "ALTIMETER PFD 2", status: "SET", coords: { x: 75.9, y: 22.4 } },
                        { id: "p16", label: "ALTIMETER STBY", status: "SET", coords: { x: 57.4, y: 32 } },
                        { id: "p19", label: "CLEARANCE", status: "OBTAIN", coords: { x: 77.9, y: 44.2 } },
                        { id: "p21", label: "PARKING BRAKE", status: "SET", coords: { x: 38.4, y: 40.9 } }
                    ]
                },
                {
                    id: "final_prep", title: "Final Cockpit Preparation", img: "final-cockpit-preparation", role: "PM",
                    items: [
                        { id: "f1", label: "PARKING BRAKE", status: "SET (CYCLE)", coords: { x: 41.3, y: 62.6 } },
                        { id: "f2", label: "IGNITION", status: "NORM", coords: { x: 13.6, y: 78.1 } },
                        { id: "f3", label: "STANDBY POWER", status: "OFF", coords: { x: 7.6, y: 76.3 } },
                        { id: "f4", label: "EMERGENCY POWER LEVER", status: "NORMAL", coords: { x: 56.4, y: 75.6 } },
                        { id: "f5", label: "POWER LEVER", status: "IDLE", coords: { x: 58.9, y: 65.8 } },
                        { id: "f6", label: "PROPELLER CONTROL LEVER", status: "FULL FORWARD", coords: { x: 61.8, y: 72.7 } },
                        { id: "f7", label: "FUEL CONDITION LEVER", status: "CUT OFF", coords: { x: 62.7, y: 69.4 } },
                        { id: "f8", label: "BLEED AIR HEAT", status: "OFF", coords: { x: 66.8, y: 61.8 } },
                        { id: "f9", label: "CABIN MIXING AIR", status: "FLT/PUSH", coords: { x: 68.7, y: 61.5 } },
                        { id: "f10", label: "FUEL SELECTOR", status: "BOTH ON", coords: { x: 56.7, y: 20.5 } },
                        { id: "f11", label: "VENTILATIONS", status: "OFF", coords: { x: 59.9, y: 16.2 } },
                        { id: "f12", label: "DECISION: CHECKLIST", type: "question", role: "PM", prompt: "Qual Check List solicitar agora?", choices: ["Before Start", "Parking"], correct: 0, coords: { x: 50, y: 50 } },
                        { id: "f13", label: "DECISION: COPILOT", type: "question", role: "PF", prompt: "Ação do Copiloto após Down to the Line?", choices: ["Pedir autorização", "Continuar leitura"], correct: 0, coords: { x: 50, y: 50 } },
                        { id: "f14", label: "BEACON/ NAV LIGHT", status: "ON", coords: { x: 30.3, y: 42.6 } },
                        { id: "f15", label: "FUEL BOOST", status: "ON", coords: { x: 18, y: 66.9 } },
                        { id: "f18", label: "FINAL CALLOUT", type: "question", role: "PM", prompt: "Qual a solicitação final?", choices: ["Below the Line", "Take Off"], correct: 0, coords: { x: 50, y: 50 } }
                    ]
                },
                {
                    id: "ils_approach", title: "Approach Procedure - ILS", img: "final-cockpit-preparation", multi: true,
                    items: [
                        { id: "il1", event: "ILS Autorizado", label: "APP MODE", status: "ARM", callout: "LOC and GS armed", role: "PF", coords: { x: 57.2, y: 36.5 } },
                        { id: "il2", event: "ILS Autorizado", label: "FMA", status: "CHECKED", callout: "Checked", role: "PM", coords: { x: 40.9, y: 39 } },
                        { id: "il3", event: "IAF reached", label: "PROP CONTROL", status: "FULL FWD", callout: "PROPELLER SET", role: "PF", coords: { x: 60.4, y: 72.5 } },
                        { id: "il4", event: "IAF reached", label: "PM CHECK", status: "CHECKED", callout: "Checked", role: "PM", coords: { x: 60.1, y: 71.7 } },
                        { id: "il5", event: "LOC verde", label: "PF CALLOUT", status: "LOC", role: "PF", coords: { x: 75.4, y: 43.5 } },
                        { id: "il6", event: "LOC verde", label: "FMA", status: "CAPTURE", role: "PM", coords: { x: 41.6, y: 43.9 } },
                        { id: "il7", event: "2.000 AFE", label: "PF REQUEST", status: "FLAPS 10", role: "PF", coords: { x: 66.1, y: 70.5 } },
                        { id: "il8", event: "2.000 AFE", label: "SPEED", status: "CHECKED", role: "PM", coords: { x: 35.2, y: 43.5 } },
                        { id: "il10", event: "GS verde", label: "PF CALLOUT", status: "GLIDESLOPE", role: "PF", coords: { x: 75.4, y: 43.9 } },
                        { id: "il12", event: "GS verde", label: "GO AROUND ALT", status: "SET", role: "PF", coords: { x: 61.5, y: 36.5 } },
                        { id: "il13", event: "1.800 AFE", label: "PF REQUEST", status: "FLAPS 20", role: "PF", coords: { x: 66.1, y: 67.2 } },
                        { id: "il20", event: "1.800 AFE", label: "FUEL TANK", status: "BOTH ON", role: "PM", coords: { x: 56.9, y: 19.7 } },
                        { id: "il21", event: "1.800 AFE", type: "question", role: "PF", prompt: "O que solicitar após 1800ft?", choices: ["Landing Check List", "Descent Check List"], correct: 0, coords: { x: 50, y: 50 } },
                        { id: "il22", event: "Estabilização", label: "FLAPS", status: "LANDING", role: "PF", coords: { x: 64.4, y: 64.4 } },
                        { id: "il24", event: "Mínimos", label: "PM REPORT", status: "Runway insight", role: "PM", coords: { x: 38.7, y: 42.2 } }
                    ]
                }
            ],
            abnormal: {
                title: "Generator Failure",
                phases: [
                    { id: "a1", role: 'PM', img: 'imagem1-generatorfailure', type: 'choice', prompt: 'Você identificou a CAS MSG?', choices: ['Sim', 'Não'], correct: 0 },
                    { id: "a2", role: 'PM', img: 'imagem1-generatorfailure', type: 'hotspot', coords: { x: 26, y: 91.9 } },
                    { id: "a4", role: 'BOTH', img: 'imagem1-generatorfailure', type: 'reasoning', prompt: 'CRM Analysis (6 itens):', items: ['Pane resolvida.', 'Causa desconhecida.', 'Aeronave AOG.', 'Retornar.', 'Sem suporte.', 'Não resetar.'], required: 6 }
                ]
            }
        };

        // --- PILOT SVG ---
        const PilotSVG = ({ role, active }) => {
            const stripes = role === 'PM' ? 4 : 3;
            return (
                <div className={`transition-all duration-700 w-24 ${active ? 'pilot-active-glow opacity-100 scale-105' : 'opacity-20 grayscale'}`}>
                    <svg viewBox="0 0 200 280" className="w-full h-auto drop-shadow-2xl">
                        <path d="M40 280 L160 280 L160 110 Q160 80 130 80 L70 80 Q40 80 40 110 Z" fill="#2d3748" />
                        <rect x="65" y="45" width="70" height="40" rx="10" fill="#1a202c" />
                        <path d="M50 280 L150 280 L145 130 Q145 100 100 100 Q55 100 55 130 Z" fill="#0f172a" />
                        <g transform="translate(50, 110) rotate(-10)">
                            <rect width="38" height="15" fill="black" rx="2" />
                            {Array.from({length: stripes}).map((_, i) => <rect key={i} x={4+(i*8)} y="3" width="4" height="9" fill="#fbbf24" />)}
                        </g>
                        <g transform="translate(112, 103) rotate(10)">
                            <rect width="38" height="15" fill="black" rx="2" />
                            {Array.from({length: stripes}).map((_, i) => <rect key={i} x={4+(i*8)} y="3" width="4" height="9" fill="#fbbf24" />)}
                        </g>
                        <ellipse cx="100" cy="75" rx="22" ry="28" fill="#e0ac69" />
                        <path d="M78 70 Q78 35 100 35 Q122 35 122 70 L122 85 L78 85 Z" fill="#1c1917" />
                        <path d="M75 75 Q75 45 100 45 Q125 45 125 75" fill="none" stroke="#4a5568" strokeWidth="4" />
                    </svg>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('home');
            const [activeProc, setActiveProc] = useState(null);
            const [step, setStep] = useState(0);
            const [stage, setStage] = useState(1);
            const [manualImages, setManualImages] = useState({});
            const [showDev, setShowDev] = useState(false);
            const [calibActive, setCalibActive] = useState(false);
            const [calibResults, setCalibResults] = useState([]);
            
            // Analytics
            const [totalClicks, setTotalClicks] = useState(0);
            const [startTime, setStartTime] = useState(null);
            const [showResults, setShowResults] = useState(false);

            const wrapperRef = useRef(null);

            const activeItems = useMemo(() => {
                if (!activeProc) return [];
                return view === 'normal_sim' ? (activeProc.items || []) : (activeProc.phases || []);
            }, [activeProc, view]);

            const activeItem = useMemo(() => {
                if (!activeItems || activeItems.length === 0 || step >= activeItems.length) return null;
                return activeItems[step];
            }, [activeItems, step]);

            const handleImgClick = (e) => {
                if (!wrapperRef.current || !activeItem || showResults) return;
                setTotalClicks(prev => prev + 1);

                const rect = wrapperRef.current.getBoundingClientRect();
                const x = parseFloat((((e.clientX - rect.left) / rect.width) * 100).toFixed(1));
                const y = parseFloat((((e.clientY - rect.top) / rect.height) * 100).toFixed(1));

                if (calibActive) {
                    setCalibResults(prev => [...prev, { label: activeItem.label || 'Point', x, y }]);
                    if (step < activeItems.length - 1) setStep(step + 1);
                    else { setCalibActive(false); setShowDev(true); }
                    return;
                }

                if (activeItem.type === 'question' || activeItem.type === 'choice' || activeItem.type === 'reasoning') return;
                const target = activeItem.coords;
                if (target && Math.sqrt(Math.pow(x - target.x, 2) + Math.pow(y - target.y, 2)) < 6.5) advanceStep();
            };

            const advanceStep = () => {
                if (!activeItems || activeItems.length === 0) return;
                if (step < activeItems.length - 1) { setStep(step + 1); }
                else {
                    if (view === 'normal_sim' && stage < 3) { setStage(prev => prev + 1); setStep(0); }
                    else { setShowResults(true); }
                }
            };

            const startProcedure = (proc) => {
                setActiveProc(proc);
                setView(proc.id === 'generator' ? 'abnormal_sim' : 'normal_sim');
                setStep(0); setStage(1); setTotalClicks(0); setStartTime(Date.now()); setShowResults(false);
            };

            const renderChecklist = (targetRole, title, align) => {
                if (!activeProc || stage === 3 || activeItems.length === 0 || showResults) return null;
                const isApproach = activeProc.id === 'ils_approach';
                return (
                    <aside className={`w-64 bg-[#0f172a] border-${align === 'left' ? 'r' : 'l'} border-slate-800 flex flex-col shrink-0 h-full z-40 shadow-2xl`}>
                        <div className="p-3 bg-slate-900/60 text-center text-blue-400 font-black text-[8px] uppercase tracking-widest border-b border-white/5">{title}</div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3 checklist-scroll">
                            {activeItems.map((it, i) => {
                                if (isApproach && it.role !== targetRole) return null;
                                if (!isApproach && activeProc.role !== targetRole && it.role !== targetRole) return null;
                                return (
                                    <div key={it.id} className={`p-2 rounded-xl border transition-all duration-300 ${i === step ? 'bg-blue-600 border-blue-400 shadow-xl' : i < step ? 'opacity-30' : 'bg-slate-800/20 border-white/5 opacity-10'}`}>
                                        <div className="text-[8px] font-black uppercase truncate">{it.label || 'SOP ITEM'}</div>
                                        <div className="text-[7px] font-bold opacity-70 mt-0.5 uppercase italic">{it.callout || it.status}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </aside>
                );
            };

            return (
                <ErrorBoundary>
                    <div className="h-screen flex flex-col overflow-hidden bg-slate-950">
                        {view === 'home' && (
                            <div className="flex-1 flex flex-col items-center justify-center p-10 fade-in">
                                <h1 className="text-white font-black text-6xl italic uppercase tracking-tighter mb-16 underline decoration-blue-600">CARAVAN PRO</h1>
                                <div className="grid grid-cols-2 gap-10 w-full max-w-4xl px-4 text-center">
                                    <button onClick={() => setView('selection')} className="bg-slate-900 border-2 border-emerald-500/20 p-12 rounded-[40px] hover:border-emerald-500 transition-all flex flex-col items-center group shadow-2xl active:scale-95">
                                        <Icons.Play /> <h2 className="text-xl font-black uppercase text-white mt-4 tracking-widest">Normal Training</h2>
                                    </button>
                                    <button onClick={() => startProcedure(DATABASE.abnormal)} className="bg-slate-900 border-2 border-red-500/20 p-12 rounded-[40px] hover:border-red-500 transition-all flex flex-col items-center group shadow-2xl active:scale-95">
                                        <Icons.Alert /> <h2 className="text-xl font-black uppercase text-white mt-4 tracking-widest">Emergency Flow</h2>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'selection' && (
                            <div className="flex-1 flex flex-col items-center justify-center p-10 bg-slate-950 text-center fade-in">
                                <button onClick={() => setView('home')} className="absolute top-10 left-10 text-slate-500 font-black text-xs uppercase hover:text-white transition-all flex items-center gap-2 font-bold tracking-widest"><Icons.Back /> Voltar</button>
                                <h2 className="text-3xl font-black uppercase italic mb-12 text-blue-500 underline underline-offset-8">Select Procedure</h2>
                                <div className="flex flex-col gap-4 w-full max-w-lg mx-auto">
                                    {DATABASE.normal.map(p => (
                                        <button key={p.id} onClick={() => startProcedure(p)} className="bg-slate-900 p-8 rounded-[2rem] border border-white/5 hover:bg-blue-600 transition-all text-left flex justify-between font-black uppercase italic shadow-xl active:scale-95">{p.title} <span>▶</span></button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {(view === 'normal_sim' || view === 'abnormal_sim') && activeProc && (
                            <div className="flex-1 flex overflow-hidden relative">
                                {renderChecklist("PM", "COMMANDER (LEFT)", "left")}

                                <div className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
                                    <header className="h-14 bg-slate-900 border-b border-white/5 flex items-center justify-between px-6 shrink-0 z-50 shadow-xl">
                                        <div className="flex items-center gap-4 text-[10px]">
                                            <button onClick={() => setView('home')} className="p-2 bg-slate-800 rounded-lg hover:bg-red-600 transition-colors uppercase font-black tracking-widest">Menu</button>
                                            <span className={`px-3 py-1 rounded-full font-black uppercase italic ${stage === 3 ? 'bg-emerald-600 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]' : 'bg-blue-600 text-white'}`}>
                                                {stage === 3 ? 'Memory Test' : `Stage ${stage}`}
                                            </span>
                                            <span className="font-black uppercase text-slate-400 italic truncate max-w-[150px]">{activeProc.title}</span>
                                        </div>
                                        <button onClick={() => setShowDev(true)} className="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest italic">Dev</button>
                                    </header>

                                    <main className="flex-1 flex flex-col items-center justify-center p-4 relative overflow-hidden bg-black shadow-inner">
                                        {showResults && (
                                            <div className="result-overlay fade-in">
                                                <div className="result-card flex flex-col animate-in zoom-in duration-300">
                                                    <div className="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_40px_rgba(16,185,129,0.5)]">
                                                        <Icons.Check />
                                                    </div>
                                                    <h2 className="text-3xl font-black uppercase italic mb-2 tracking-tighter text-white leading-none">Debriefing</h2>
                                                    <p className="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-10 text-center">{activeProc.title}</p>
                                                    
                                                    <div className="flex flex-col gap-3 mb-10">
                                                        <div className="bg-black/40 p-5 rounded-3xl border border-white/5 flex items-center justify-between">
                                                            <div className="flex items-center gap-3 text-blue-400"><Icons.Target /> <span className="text-[10px] font-black uppercase italic">Cliques</span></div>
                                                            <span className="text-2xl font-black italic">{totalClicks}</span>
                                                        </div>
                                                        <div className="bg-black/40 p-5 rounded-3xl border border-white/5 flex items-center justify-between">
                                                            <div className="flex items-center gap-3 text-amber-500"><Icons.Benchmark /> <span className="text-[10px] font-black uppercase italic">Cliques SOP</span></div>
                                                            <span className="text-2xl font-black italic text-slate-400">{(activeProc.items?.length || activeProc.phases?.length || 0) * 2}</span>
                                                        </div>
                                                        <div className="bg-black/40 p-5 rounded-3xl border border-white/5 flex items-center justify-between">
                                                            <div className="flex items-center gap-3 text-emerald-400"><Icons.Timer /> <span className="text-[10px] font-black uppercase italic text-left">Tempo</span></div>
                                                            <span className="text-2xl font-black italic">{Math.floor((Date.now() - (startTime || 0))/1000)}s</span>
                                                        </div>
                                                    </div>

                                                    <button onClick={() => setView('home')} className="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black uppercase text-xs shadow-2xl active:scale-95 transition-all tracking-widest leading-none">Finalizar</button>
                                                </div>
                                            </div>
                                        )}

                                        {activeItem?.event && stage < 3 && !showResults && (
                                            <div className="event-header-box fade-in">
                                                <span className="text-[9px] font-black text-blue-400 uppercase block mb-1">EVENTO ATUAL</span>
                                                <span className="text-xl font-black uppercase italic text-white leading-none tracking-tighter italic">{activeItem.event}</span>
                                            </div>
                                        )}

                                        {activeItem?.type === 'question' && stage < 3 && !showResults && (
                                            <div className="absolute inset-0 z-[200] flex items-center justify-center p-8 bg-slate-950/90 backdrop-blur-3xl text-left font-bold italic uppercase">
                                                <div className="bg-[#0f172a] p-10 rounded-[3rem] border border-blue-500/30 max-w-xl w-full text-center fade-in shadow-2xl">
                                                    <h3 className="text-xl font-black uppercase italic mb-8 px-4 leading-tight tracking-tighter">{activeItem.prompt}</h3>
                                                    <div className="space-y-3">
                                                        {activeItem.choices.map((choice, idx) => (
                                                            <button key={idx} onClick={() => idx === activeItem.correct ? advanceStep() : alert("SOP Error!")} className="w-full py-5 px-8 rounded-2xl bg-slate-900 border border-white/5 hover:border-blue-500 transition-all font-black uppercase italic text-[11px] flex justify-between items-center group active:scale-95 shadow-xl leading-none">
                                                                {choice} <Icons.Arrow />
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        <div id="imageContainer" ref={wrapperRef} onClick={handleImgClick}>
                                            <div className="img-tag-badge">FILE: {activeProc.img}.jpg</div>
                                            <img src={manualImages[activeProc.img] || `./${activeProc.img}.jpg`} id="mainImg" className={`rounded-2xl shadow-2xl border border-white/10 transition-all duration-1000 ${stage === 3 ? 'opacity-100 ring-2 ring-emerald-500/20 shadow-[0_0_60px_rgba(16,185,129,0.1)] scale-100' : ''}`} onError={(e) => { e.target.src='https://placehold.co/1280x720/222/555?text=IMAGEM+PENDENTE'; }} />
                                            {stage === 1 && activeItem?.coords && !showResults && (
                                                <div className="hotspot-target" style={{ left: `${activeItem.coords.x}%`, top: `${activeItem.coords.y}%` }} />
                                            )}
                                        </div>
                                    </main>

                                    <footer className="h-28 w-full bg-[#080d1a] border-t border-white/5 flex justify-between items-end px-12 shrink-0 shadow-2xl relative z-10">
                                        <div className="flex flex-col items-center mb-[-5px]">
                                            <span className="text-[7px] text-slate-500 uppercase mb-1 font-black italic tracking-widest">COMMANDER</span>
                                            <PilotSVG role="PM" active={activeItem?.role === 'PM' || activeItem?.role === 'BOTH'} />
                                        </div>
                                        <div className="mb-8 flex flex-col items-center">
                                            <div className="bg-black/60 px-8 py-2 rounded-full border border-blue-500/10 backdrop-blur-xl">
                                                <div className="flex gap-1.5 justify-center max-w-[240px]">
                                                    {activeItems.map((_, i) => (
                                                        <div key={i} className={`w-1.5 h-1.5 rounded-full ${i <= step ? 'bg-emerald-500 shadow-[0_0_12px_#10b981]' : 'bg-slate-800'} transition-all duration-300`} />
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex flex-col items-center mb-[-5px]">
                                            <span className="text-[7px] text-blue-500 uppercase mb-1 font-black italic tracking-widest text-right leading-none">COPILOT</span>
                                            <PilotSVG role="PF" active={activeItem?.role === 'PF' || activeItem?.role === 'BOTH' || stage === 3} />
                                        </div>
                                    </footer>
                                </div>

                                {renderChecklist("PF", "SIC (RIGHT)", "right")}
                            </div>
                        )}

                        {showDev && (
                            <div className="fixed inset-0 z-[10000] bg-slate-950/98 backdrop-blur-3xl flex items-center justify-center p-6 text-xs text-left">
                                <div className="bg-slate-900 border border-white/10 w-full max-w-xl rounded-[40px] p-10 shadow-2xl relative text-left">
                                    <button onClick={() => setShowDev(false)} className="absolute top-8 right-8 text-xs font-black uppercase text-slate-500 hover:text-white font-bold">Close [X]</button>
                                    <h2 className="text-2xl font-black uppercase text-emerald-400 mb-8 tracking-tighter italic underline decoration-blue-600">Dev Console v130</h2>
                                    <div className="grid grid-cols-2 gap-6 mb-8 text-left">
                                        <button onClick={() => document.getElementById('upImg').click()} className="bg-slate-800 p-6 rounded-3xl hover:bg-blue-600 transition-all uppercase shadow-lg font-black italic tracking-widest">Upload Panel</button>
                                        <input type="file" id="upImg" className="hidden" onChange={(e) => {
                                            const r = new FileReader();
                                            r.onload = (ev) => { setManualImages({...manualImages, [activeProc.img]: ev.target.result}); alert("Carregada!"); };
                                            r.readAsDataURL(e.target.files[0]);
                                        }} />
                                        <button onClick={() => { setCalibActive(true); setShowDev(false); setStep(0); setCalibResults([]); }} className="bg-emerald-600 p-6 rounded-3xl hover:bg-emerald-500 transition-all uppercase shadow-lg font-black italic tracking-widest">Map</button>
                                    </div>
                                    <div className="bg-black p-6 rounded-3xl h-40 border border-white/5 shadow-inner overflow-hidden text-emerald-500 font-mono text-[9px] uppercase leading-relaxed italic">
                                        {calibResults.map(r => `Item: ${r.label} | { x: ${r.x}, y: ${r.y} }`).join('\n')}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </ErrorBoundary>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
